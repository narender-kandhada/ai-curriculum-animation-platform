version: '3.8'

services:
  backend:
    build: ./backend
    container_name: ai-curriculum-backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
      - MODEL_PATH=/app/models/base_model
      - LORA_PATH=/app/models/fine_tuned
    volumes:
      - ./outputs:/app/outputs
      - ./models:/app/models
    command: python app/main.py

  frontend:
    image: node:18-alpine
    container_name: ai-curriculum-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
